<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Rollout Heaven</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  :root {
    --bg-deep: #080b1e;
    --bg-card: #0f1332;
    --bg-input: #0a0d24;
    --border: #1a1f4a;
    --accent-1: #7b2ff7;
    --accent-2: #00d4ff;
    --gold: #ffd700;
    --text-dim: #6b7094;
    --gradient-primary: linear-gradient(135deg, #7b2ff7, #00d4ff);
    --glow-purple: 0 0 20px rgba(123,47,247,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg-deep); color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 30% 20%, rgba(123,47,247,0.08) 0%, transparent 50%), radial-gradient(circle at 70% 80%, rgba(0,212,255,0.05) 0%, transparent 50%); pointer-events: none; }
  .auth-container { width: 100%; max-width: 420px; padding: 24px; position: relative; z-index: 1; }
  .auth-logo { text-align: center; margin-bottom: 40px; position: relative; overflow: visible; }
  .auth-logo .logo-wrap { position: relative; display: inline-block; animation: flyUp 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards, hover 3s ease-in-out 2.2s infinite; }
  .auth-logo img { width: 280px; height: auto; margin-bottom: 16px; filter: drop-shadow(0 0 16px rgba(123,47,247,0.4)) drop-shadow(0 0 40px rgba(0,212,255,0.15)); }
  /* Wind lines */
  .wind-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
  .wind-line { position: absolute; height: 2px; border-radius: 2px; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.6), transparent); opacity: 0; }
  .wind-line:nth-child(1) { width: 60px; top: 30%; left: -30px; animation: windSweep 1.8s 0.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  .wind-line:nth-child(2) { width: 80px; top: 50%; left: -50px; animation: windSweep 1.8s 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  .wind-line:nth-child(3) { width: 45px; top: 70%; left: -20px; animation: windSweep 1.8s 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  .wind-line:nth-child(4) { width: 55px; top: 40%; right: -40px; left: auto; animation: windSweepR 1.8s 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  .wind-line:nth-child(5) { width: 70px; top: 65%; right: -30px; left: auto; animation: windSweepR 1.8s 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  /* Sparkle particles */
  .sparkle { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: #fff; opacity: 0; box-shadow: 0 0 6px rgba(255,255,255,0.8); }
  .sparkle:nth-child(6) { top: 20%; left: 15%; animation: sparkleFloat 2s 0.8s ease-out forwards; }
  .sparkle:nth-child(7) { top: 35%; right: 10%; animation: sparkleFloat 2.2s 1s ease-out forwards; }
  .sparkle:nth-child(8) { top: 55%; left: 25%; animation: sparkleFloat 1.8s 1.2s ease-out forwards; }
  .sparkle:nth-child(9) { top: 15%; right: 20%; animation: sparkleFloat 2.4s 0.6s ease-out forwards; }
  .sparkle:nth-child(10) { top: 45%; left: 8%; animation: sparkleFloat 2s 1.4s ease-out forwards; }

  @keyframes flyUp {
    0% { transform: translateY(80px) scale(0.7) rotate(-8deg); opacity: 0; filter: blur(4px); }
    40% { transform: translateY(-20px) scale(1.05) rotate(3deg); opacity: 1; filter: blur(0); }
    60% { transform: translateY(5px) scale(0.98) rotate(-1deg); opacity: 1; }
    80% { transform: translateY(-8px) scale(1.02) rotate(1deg); opacity: 1; }
    100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes hover {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-8px) rotate(1deg); }
    75% { transform: translateY(-4px) rotate(-0.5deg); }
  }
  @keyframes windSweep {
    0% { opacity: 0; transform: translateX(0) translateY(0) scaleX(0.3); }
    20% { opacity: 0.8; transform: translateX(30px) translateY(-15px) scaleX(1); }
    60% { opacity: 0.5; transform: translateX(120px) translateY(-40px) scaleX(1.5); }
    100% { opacity: 0; transform: translateX(200px) translateY(-60px) scaleX(0.5); }
  }
  @keyframes windSweepR {
    0% { opacity: 0; transform: translateX(0) translateY(0) scaleX(0.3); }
    20% { opacity: 0.8; transform: translateX(-30px) translateY(-15px) scaleX(1); }
    60% { opacity: 0.5; transform: translateX(-120px) translateY(-40px) scaleX(1.5); }
    100% { opacity: 0; transform: translateX(-200px) translateY(-60px) scaleX(0.5); }
  }
  @keyframes sparkleFloat {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    30% { opacity: 1; transform: translateY(-10px) scale(1); }
    70% { opacity: 0.6; transform: translateY(-30px) scale(0.8); }
    100% { opacity: 0; transform: translateY(-50px) scale(0); }
  }
  .auth-logo p { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-top: 6px; animation: fadeIn 1s 1.5s both; }
  .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 40px rgba(123,47,247,0.05); }
  .auth-tabs { display: flex; gap: 4px; background: var(--bg-input); border-radius: 8px; padding: 4px; margin-bottom: 28px; }
  .auth-tab { flex: 1; padding: 10px; border: none; background: none; color: var(--text-dim); font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 6px; font-family: 'Inter', sans-serif; transition: all 0.3s; }
  .auth-tab.active { background: var(--gradient-primary); color: #fff; box-shadow: var(--glow-purple); }
  .auth-form { display: none; }
  .auth-form.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
  .form-group input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 14px; font-family: 'Inter', sans-serif; transition: all 0.3s; }
  .form-group input:focus { outline: none; border-color: var(--accent-1); box-shadow: 0 0 12px rgba(123,47,247,0.2); }
  .pw-wrapper { position: relative; }
  .pw-wrapper input { padding-right: 44px; }
  .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-dim); padding: 4px; font-size: 16px; line-height: 1; transition: color 0.2s; }
  .pw-toggle:hover { color: var(--accent-2); }
  .btn-primary { width: 100%; padding: 14px; background: var(--gradient-primary); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.3s; position: relative; overflow: hidden; }
  .btn-primary::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent); transform: rotate(45deg); transition: all 0.6s; }
  .btn-primary:hover::before { left: 100%; }
  .btn-primary:hover { box-shadow: 0 4px 20px rgba(123,47,247,0.4); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .error-msg { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.2); border-radius: 8px; padding: 12px; font-size: 13px; color: #ff6b6b; margin-bottom: 16px; display: none; }
  .success-msg { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); border-radius: 8px; padding: 12px; font-size: 13px; color: var(--accent-2); margin-bottom: 16px; display: none; }
  .trial-badge { text-align: center; margin-top: 20px; padding: 12px; background: rgba(123,47,247,0.08); border: 1px solid rgba(123,47,247,0.2); border-radius: 8px; }
  .trial-badge .highlight { background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; font-size: 14px; }
  .trial-badge .detail { color: var(--text-dim); font-size: 12px; margin-top: 4px; }
  .remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
  .remember-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent-1); cursor: pointer; }
  .remember-row label { font-size: 13px; color: var(--text-dim); cursor: pointer; margin: 0; }
  .verify-notice { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); border-radius: 8px; padding: 16px; text-align: center; display: none; }
  .verify-notice h3 { color: #fff; font-size: 15px; margin-bottom: 8px; }
  .verify-notice p { color: #9ea2b8; font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
  .verify-notice .email-highlight { color: var(--accent-2); font-weight: 600; }
  .btn-secondary { background: none; border: 1px solid var(--border); color: var(--accent-2); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.3s; }
  .btn-secondary:hover { border-color: var(--accent-2); box-shadow: 0 0 12px rgba(0,212,255,0.15); }
  .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .alt-text { text-align: center; font-size: 12px; color: var(--text-dim); }

  /* ═══ MOBILE ═══ */
  @media (max-width: 480px) {
    .auth-container { padding: 16px; }
    .auth-logo img { width: 200px; }
    .auth-logo p { font-size: 11px; letter-spacing: 1.5px; }
    .auth-card { padding: 24px 20px; border-radius: 10px; }
    .auth-tab { padding: 12px 8px; font-size: 12px; min-height: 44px; }
    .form-group input { padding: 14px; font-size: 16px; }
    .btn-primary { padding: 16px; min-height: 48px; font-size: 15px; }
    .pw-toggle { padding: 8px; font-size: 18px; }
    .trial-badge { padding: 14px; }
    .trial-badge .highlight { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-logo">
    <div class="logo-wrap">
      <img src="/logo.png" alt="Rollout Heaven">
      <div class="wind-lines">
        <div class="wind-line"></div>
        <div class="wind-line"></div>
        <div class="wind-line"></div>
        <div class="wind-line"></div>
        <div class="wind-line"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
      </div>
    </div>
    <p>Release Management Platform</p>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showForm('login')">Log In</button>
      <button class="auth-tab" onclick="showForm('signup')">Sign Up</button>
    </div>

    <div id="error" class="error-msg"></div>
    <div id="success" class="success-msg"></div>

    <!-- Verification Notice (shown after signup or when unverified user tries to log in) -->
    <div id="verifyNotice" class="verify-notice">
      <h3>Check Your Email</h3>
      <p>We sent a verification link to<br><span id="verifyEmail" class="email-highlight"></span></p>
      <p>Click the link to verify your email and start your free trial.</p>
      <button class="btn-secondary" id="resendBtn" onclick="resendVerification()">Resend Email</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrapper">
          <input type="password" id="loginPassword" required placeholder="Enter your password" autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePw('loginPassword', this)" aria-label="Show password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="rememberMe" checked>
        <label for="rememberMe">Remember me</label>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Log In</button>
    </form>

    <!-- Signup Form -->
    <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrapper">
          <input type="password" id="signupPassword" required placeholder="Min 8 characters" minlength="8" autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw('signupPassword', this)" aria-label="Show password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="pw-wrapper">
          <input type="password" id="signupConfirm" required placeholder="Confirm your password" autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw('signupConfirm', this)" aria-label="Show password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="signupBtn">Start Free Trial</button>
      <div class="trial-badge">
        <div class="highlight">7 Days Free</div>
        <div class="detail">Then $14.99/month. Cancel anytime.</div>
      </div>
    </form>
  </div>
</div>

<script>
let pendingVerifyEmail = '';

function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.innerHTML = isHidden
    ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
}

function showForm(type) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.getElementById('error').style.display = 'none';
  document.getElementById('success').style.display = 'none';
  document.getElementById('verifyNotice').style.display = 'none';

  if (type === 'login') {
    document.querySelector('.auth-tab:first-child').classList.add('active');
    document.getElementById('loginForm').classList.add('active');
  } else {
    document.querySelector('.auth-tab:last-child').classList.add('active');
    document.getElementById('signupForm').classList.add('active');
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('success').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('success');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('error').style.display = 'none';
}

function showVerifyNotice(email) {
  pendingVerifyEmail = email;
  document.getElementById('verifyEmail').textContent = email;
  document.getElementById('verifyNotice').style.display = 'block';
  document.getElementById('error').style.display = 'none';
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
}

async function resendVerification() {
  const btn = document.getElementById('resendBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    await fetch('/api/resend-verification', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: pendingVerifyEmail })
    });
    btn.textContent = 'Sent!';
    setTimeout(() => { btn.textContent = 'Resend Email'; btn.disabled = false; }, 3000);
  } catch {
    btn.textContent = 'Resend Email';
    btn.disabled = false;
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value,
        rememberMe: document.getElementById('rememberMe').checked
      })
    });
    const data = await res.json();

    if (!res.ok) {
      if (data.needsVerification) {
        showVerifyNotice(data.email);
      } else {
        showError(data.error);
      }
      return;
    }

    if (data.hasAccess) {
      window.location.href = '/';
    } else {
      window.location.href = '/subscribe';
    }
  } catch (err) {
    showError('Something went wrong. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Log In';
  }
}

async function handleSignup(e) {
  e.preventDefault();
  const pw = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('signupConfirm').value;
  if (pw !== confirm) { showError('Passwords do not match'); return; }

  const btn = document.getElementById('signupBtn');
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const email = document.getElementById('signupEmail').value;
    const res = await fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error); return; }

    showVerifyNotice(email);
  } catch (err) {
    showError('Something went wrong. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Start Free Trial';
  }
}

// Check for ?verified=1 in URL (after email verification redirect)
if (new URLSearchParams(window.location.search).get('verified') === '1') {
  showSuccess('Email verified! You can now log in.');
  window.history.replaceState({}, '', '/login');
}
</script>
</body>
</html>
