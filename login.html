<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Marketing Command Center</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #060606; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .auth-container { width: 100%; max-width: 420px; padding: 24px; }
  .auth-logo { text-align: center; margin-bottom: 40px; }
  .auth-logo h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: 1px; }
  .auth-logo h1 span { color: #c9a84c; }
  .auth-logo p { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-top: 6px; }
  .auth-card { background: #111; border: 1px solid #1f1f1f; border-radius: 12px; padding: 32px; }
  .auth-tabs { display: flex; gap: 4px; background: #0a0a0a; border-radius: 8px; padding: 4px; margin-bottom: 28px; }
  .auth-tab { flex: 1; padding: 10px; border: none; background: none; color: #666; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 6px; font-family: 'Inter', sans-serif; transition: all 0.2s; }
  .auth-tab.active { background: #c9a84c; color: #000; }
  .auth-form { display: none; }
  .auth-form.active { display: block; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 500; }
  .form-group input { width: 100%; background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 14px; font-family: 'Inter', sans-serif; transition: border-color 0.2s; }
  .form-group input:focus { outline: none; border-color: #c9a84c; }
  .btn-primary { width: 100%; padding: 14px; background: #c9a84c; color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
  .btn-primary:hover { background: #d4b45c; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.2); border-radius: 8px; padding: 12px; font-size: 13px; color: #ff6b6b; margin-bottom: 16px; display: none; }
  .success-msg { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.2); border-radius: 8px; padding: 12px; font-size: 13px; color: #66bb6a; margin-bottom: 16px; display: none; }
  .trial-badge { text-align: center; margin-top: 20px; padding: 12px; background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.15); border-radius: 8px; }
  .trial-badge .highlight { color: #c9a84c; font-weight: 700; font-size: 14px; }
  .trial-badge .detail { color: #888; font-size: 12px; margin-top: 4px; }
  .divider { border: none; border-top: 1px solid #1f1f1f; margin: 20px 0; }
  .alt-text { text-align: center; font-size: 12px; color: #666; }
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-logo">
    <h1>MARKETING <span>COMMAND CENTER</span></h1>
    <p>Madigan Music</p>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showForm('login')">Log In</button>
      <button class="auth-tab" onclick="showForm('signup')">Sign Up</button>
    </div>

    <div id="error" class="error-msg"></div>
    <div id="success" class="success-msg"></div>

    <!-- Login Form -->
    <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" required placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Log In</button>
    </form>

    <!-- Signup Form -->
    <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" required placeholder="Min 8 characters" minlength="8" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="signupConfirm" required placeholder="Confirm your password" autocomplete="new-password">
      </div>
      <button type="submit" class="btn-primary" id="signupBtn">Start Free Trial</button>
      <div class="trial-badge">
        <div class="highlight">7 Days Free</div>
        <div class="detail">Then $14.99/month. Cancel anytime.</div>
      </div>
    </form>
  </div>
</div>

<script>
function showForm(type) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.getElementById('error').style.display = 'none';
  document.getElementById('success').style.display = 'none';

  if (type === 'login') {
    document.querySelector('.auth-tab:first-child').classList.add('active');
    document.getElementById('loginForm').classList.add('active');
  } else {
    document.querySelector('.auth-tab:last-child').classList.add('active');
    document.getElementById('signupForm').classList.add('active');
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('success').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('success');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('error').style.display = 'none';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value
      })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error); return; }

    if (data.hasAccess) {
      window.location.href = '/';
    } else {
      window.location.href = '/subscribe';
    }
  } catch (err) {
    showError('Something went wrong. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Log In';
  }
}

async function handleSignup(e) {
  e.preventDefault();
  const pw = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('signupConfirm').value;
  if (pw !== confirm) { showError('Passwords do not match'); return; }

  const btn = document.getElementById('signupBtn');
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const res = await fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('signupEmail').value,
        password: pw
      })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error); return; }

    window.location.href = '/';
  } catch (err) {
    showError('Something went wrong. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Start Free Trial';
  }
}
</script>
</body>
</html>
